<head>
<meta charset="UTF-8">

<title>Berichten – Spirituele Website Julia</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(to bottom,#f5f0f8,#e0d7f1);
color:#4b3b6c;
min-height:100vh;
}

/* HEADER */

header{
text-align:center;
background-color:#000;
padding:20px 0;
margin-bottom:50px;
box-shadow:0 4px 6px rgba(0,0,0,0.2);
position:sticky;
top:0;
z-index:100;
}

/* MENU */

.dropdown{
position:relative;
display:inline-block;
}

.dropbtn{
background-color:#4b3b6c;
color:#fff;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
transition:background-color 0.3s ease;
}

.dropbtn:hover{
background-color:#6e5ca0;
}

.dropdown-content{
display:none;
position:absolute;
background-color:#1c1c1c;
min-width:160px;
box-shadow:0px 8px 16px rgba(0,0,0,0.4);
border-radius:8px;
overflow:hidden;
z-index:1;
}

.dropdown-content a{
color:#fff;
padding:12px 16px;
text-decoration:none;
display:block;
}

.dropdown-content a:hover{
background-color:#4b3b6c;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* SECTIONS */

section{
max-width:800px;
width:90%;
margin:20px auto;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* AFBEELDINGEN */

.article-image{
width:100%;
max-width:600px;
height:auto;
display:block;
margin:auto;
border-radius:8px;
}

/* TEXT */

h1{
font-family:'Palatino Linotype','Book Antiqua',serif;
font-size:2em;
margin-bottom:20px;
}

p{
font-size:0.95em;
line-height:1.5;
}

/* BUTTON */

button{
background:#4b3b6c;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
background:#6e5ca0;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
margin-top:50px;
background-color:#eee;
font-size:14px;
}


#myHeader {

  text-align: center;
}

</style>
</head>
