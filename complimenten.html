/* sterren */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.8;
animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
0%{opacity:0.2; transform:scale(0.8);}
50%{opacity:1; transform:scale(1.5);}
100%{opacity:0.2; transform:scale(0.8);}
}
