<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gokkast Deluxe+ Casino</title>

<style>
body {margin:0;font-family:Arial;background:radial-gradient(circle,#0a0a0a,#000);color:white;}
.app {max-width:420px;margin:auto;padding:15px;}
.header {display:flex;justify-content:space-between;background:#111;padding:12px;border-radius:12px;box-shadow:0 0 10px gold;}

.slots {margin:20px 0;display:flex;justify-content:space-between;}

.reel {
  width:60px;
  height:60px;
  overflow:hidden;
  border-radius:10px;
  border:2px solid gold;
  background:#111;
  box-shadow:0 0 10px gold;
  position:relative;
}

.reel-track {
  position:absolute;
  width:100%;
}

.symbol {
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

button {width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px;font-size:16px;background:linear-gradient(45deg,gold,orange);font-weight:bold;}
.bet-select {width:100%;padding:10px;border-radius:10px;margin-top:10px;}
</style>
</head>
<body>

<div class="app">
  <h2>🎰 Casino Slots</h2>

  <div class="header">
    <div>💰 <span id="score">100</span></div>
    <div>💳 Bank: <span id="bank">0</span></div>
  </div>

  <div class="slots" id="slots"></div>

  <select id="bet" class="bet-select">
    <option value="10">10</option>
    <option value="25">25</option>
    <option value="50">50</option>
  </select>

  <button onclick="spin()">🎰 SPIN</button>
  <button id="autoBtn" onclick="toggleAutoSpin()">⚡ AUTO SPIN</button>
  <button onclick="addCredits()">➕ +100 Credits</button>
  <button onclick="cashOut()">💸 Inlossen</button>

  <p id="result"></p>
</div>

<script>
const symbols=["🍒","🍋","🍉","⭐","💎","7️⃣"];
let score=100,bank=0,spinning=false,lastWin=0;
let autoInterval=null;

function createReelTrack(){
  let track=document.createElement("div");
  track.className="reel-track";

  for(let i=0;i<30;i++){
    let div=document.createElement("div");
    div.className="symbol";
    div.innerText=symbols[Math.floor(Math.random()*symbols.length)];
    track.appendChild(div);
  }

  return track;
}

function renderSlots(){
  let c=document.getElementById("slots");
  c.innerHTML="";

  for(let i=0;i<5;i++){
    let reel=document.createElement("div");
    reel.className="reel";

    let track=createReelTrack();
    reel.appendChild(track);
    c.appendChild(reel);
  }
}

function spin(){
  if(spinning) return;
  let bet=parseInt(betEl.value);
  if(score<bet) return;

  spinning=true;
  score-=bet;

  let reels=document.querySelectorAll(".reel-track");
  let results=[];

  reels.forEach((track,i)=>{
    let pos=0;

    // 🔥 continue scroll (echte rol)
    let speed=20 + i*5;
    let interval=setInterval(()=>{
      pos+=speed;
      track.style.transform=`translateY(-${pos}px)`;

      // reset voor infinite effect
      if(pos >= track.scrollHeight/2){
        pos=0;
        track.style.transition="none";
        track.style.transform=`translateY(0px)`;
      }
    },16);

    // stop na tijd
    setTimeout(()=>{
      clearInterval(interval);

      let finalSymbol=symbols[Math.floor(Math.random()*symbols.length)];
      results.push(finalSymbol);

      // smooth uitrollen naar eindpositie
      let index=Math.floor(Math.random()*10);
      let finalPos=index*60;

      track.style.transition="transform 0.5s ease-out";
      track.style.transform=`translateY(-${finalPos}px)`;

      // zet echte symbolen
      setTimeout(()=>{
        track.innerHTML="";
        for(let j=0;j<3;j++){
          let div=document.createElement("div");
          div.className="symbol";
          div.innerText=finalSymbol;
          track.appendChild(div);
        }

        track.style.transform="translateY(0)";

        if(results.length===5) finishSpin(results,bet);
      },500);

    },1500 + i*400);
  });

  updateUI();
}

function finishSpin(results,bet){
  let win=checkWin(results,bet);
  lastWin=win;

  if(win>0){
    score+=win;
    result.innerText="🎉 WIN +"+win;
  } else result.innerText="❌ Geen winst";

  spinning=false;
  updateUI();
}

function cashOut(){
  if(lastWin>0){
    bank+=lastWin;
    lastWin=0;
    result.innerText="💸 Ingelost";
    updateUI();
  }
}

function checkWin(arr,bet){
  let c={};arr.forEach(s=>c[s]=(c[s]||0)+1);
  let max=Math.max(...Object.values(c));
  if(max===5)return bet*10;
  if(max===4)return bet*5;
  if(max===3)return bet*2;
  return 0;
}

function toggleAutoSpin(){
  if(autoInterval){
    clearInterval(autoInterval);
    autoInterval=null;
    autoBtn.innerText="⚡ AUTO SPIN";
  } else {
    autoInterval=setInterval(()=>{
      if(score<10) toggleAutoSpin();
      else spin();
    },1800);
    autoBtn.innerText="⛔ STOP AUTO";
  }
}

function addCredits(){
  score+=100;
  updateUI();
}

function updateUI(){
  scoreEl.innerText=score;
  bankEl.innerText=bank;
}

const scoreEl=document.getElementById("score");
const bankEl=document.getElementById("bank");
const result=document.getElementById("result");
const betEl=document.getElementById("bet");
const autoBtn=document.getElementById("autoBtn");

renderSlots();
updateUI();
</script>

</body>
</html>
