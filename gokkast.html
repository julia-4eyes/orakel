<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gokkast Deluxe+ Casino</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: radial-gradient(circle at center, #1a0033, #000);
        color: white;
        text-align: center;
    }
    .app {
        max-width: 440px;
        margin: 20px auto;
        padding: 15px;
        background: rgba(0,0,0,0.7);
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(255,215,0,0.6);
    }
    .header {
        display: flex;
        justify-content: space-between;
        background: linear-gradient(90deg, #222, #111);
        padding: 15px;
        border-radius: 15px;
        margin-bottom: 20px;
        border: 2px solid gold;
    }
    .balance {
        font-size: 1.3em;
        font-weight: bold;
    }
    .slots {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin: 25px 0;
        padding: 15px;
        background: #0a0a0a;
        border-radius: 15px;
        border: 3px solid #ffd700;
    }
    .reel {
        width: 70px;
        height: 210px;
        overflow: hidden;
        border-radius: 12px;
        border: 3px solid #ffd700;
        background: #111;
        box-shadow: 0 0 15px gold;
        position: relative;
    }
    .reel-track {
        position: absolute;
        width: 100%;
        transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .symbol {
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        background: rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,215,0,0.2);
    }
    button {
        width: 100%;
        padding: 16px;
        margin: 8px 0;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
    }
    .spin-btn {
        background: linear-gradient(45deg, #ffd700, #ffaa00);
        color: black;
        font-size: 22px;
    }
    .bet-select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        background: #222;
        color: white;
        border: 2px solid gold;
        font-size: 16px;
    }
    .result {
        min-height: 28px;
        font-size: 1.4em;
        font-weight: bold;
        margin: 15px 0;
    }
    .win { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
    .lose { color: #ff6666; }
</style>
</head>
<body>

<div class="app">
    <h1>🎰 Gokkast Deluxe+</h1>

    <div class="header">
        <div class="balance">💰 Saldo: <span id="score">500</span></div>
        <div class="balance">🏦 Bank: <span id="bank">0</span></div>
    </div>

    <div class="slots" id="slots"></div>

    <select id="bet" class="bet-select">
        <option value="10">Inzet: 10 credits</option>
        <option value="25">Inzet: 25 credits</option>
        <option value="50" selected>Inzet: 50 credits</option>
        <option value="100">Inzet: 100 credits</option>
    </select>

    <button class="spin-btn" onclick="spin()">🎰 SPIN</button>
    <button id="autoBtn" onclick="toggleAutoSpin()">⚡ AUTO SPIN</button>
    <button onclick="addCredits()">➕ +200 Credits</button>
    <button onclick="cashOut()">💸 Winst Inlossen</button>

    <p id="result" class="result"></p>
</div>

<script>
const symbols = ["🍒", "🍋", "🍉", "🍇", "⭐", "💎", "7️⃣", "🔔"];
let score = 500;
let bank = 0;
let spinning = false;
let autoInterval = null;
let lastWin = 0;

const scoreEl = document.getElementById("score");
const bankEl = document.getElementById("bank");
const resultEl = document.getElementById("result");
const betEl = document.getElementById("bet");
const autoBtn = document.getElementById("autoBtn");

function createReel() {
    const reel = document.createElement("div");
    reel.className = "reel";

    const track = document.createElement("div");
    track.className = "reel-track";

    // Maak lange track voor realistisch scroll effect
    for (let i = 0; i < 40; i++) {
        const sym = document.createElement("div");
        sym.className = "symbol";
        sym.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        track.appendChild(sym);
    }
    reel.appendChild(track);
    return reel;
}

function renderSlots() {
    const container = document.getElementById("slots");
    container.innerHTML = "";
    for (let i = 0; i < 5; i++) {
        container.appendChild(createReel());
    }
}

function spin() {
    if (spinning) return;

    const bet = parseInt(betEl.value);
    if (score < bet) {
        resultEl.innerHTML = "❌ Niet genoeg credits!";
        resultEl.className = "result lose";
        return;
    }

    spinning = true;
    score -= bet;
    updateUI();
    resultEl.innerHTML = "";

    const reels = document.querySelectorAll(".reel-track");
    const finalResults = [];

    reels.forEach((track, index) => {
        // Snelle spin
        let position = 0;
        const baseSpeed = 35 + index * 8;

        const spinInterval = setInterval(() => {
            position += baseSpeed;
            track.style.transform = `translateY(-${position}px)`;
        }, 16);

        // Stop op verschillende tijden voor cascade effect
        setTimeout(() => {
            clearInterval(spinInterval);

            // Bepaal winnend symbool (laatste 3 symbolen worden hetzelfde)
            const finalSymbol = symbols[Math.floor(Math.random() * symbols.length)];
            finalResults.push(finalSymbol);

            // Stop op een mooi rond getal
            const stopPosition = Math.floor(Math.random() * 15) * 70 + 70; // align met symbool

            track.style.transition = "transform 0.7s cubic-bezier(0.23, 1, 0.32, 1)";
            track.style.transform = `translateY(-${stopPosition}px)`;

            // Vervang de track door 3 identieke symbolen voor duidelijk resultaat
            setTimeout(() => {
                track.innerHTML = "";
                for (let j = 0; j < 3; j++) {
                    const sym = document.createElement("div");
                    sym.className = "symbol";
                    sym.textContent = finalSymbol;
                    track.appendChild(sym);
                }
                track.style.transition = "none";
                track.style.transform = "translateY(0px)";

                // Als alle reels klaar zijn → bereken winst
                if (finalResults.length === 5) {
                    finishSpin(finalResults, bet);
                }
            }, 800);

        }, 800 + index * 350);
    });
}

function finishSpin(results, bet) {
    const win = calculateWin(results, bet);
    lastWin = win;

    if (win > 0) {
        score += win;
        resultEl.innerHTML = `🎉 GROTE WIN! +${win} credits!`;
        resultEl.className = "result win";
    } else {
        resultEl.innerHTML = "😢 Geen winst deze keer...";
        resultEl.className = "result lose";
    }

    spinning = false;
    updateUI();
}

function calculateWin(results, bet) {
    const counts = {};
    results.forEach(s => counts[s] = (counts[s] || 0) + 1);

    const maxCount = Math.max(...Object.values(counts));

    if (maxCount === 5) return bet * 25;      // Alle 5 hetzelfde → jackpot
    if (maxCount === 4) return bet * 8;
    if (maxCount === 3) return bet * 3;
    return 0;
}

function cashOut() {
    if (lastWin > 0) {
        bank += lastWin;
        lastWin = 0;
        resultEl.innerHTML = "✅ Winst succesvol ingelost!";
        resultEl.className = "result";
        updateUI();
    } else {
        resultEl.innerHTML = "Geen winst om in te lossen";
    }
}

function toggleAutoSpin() {
    if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
        autoBtn.textContent = "⚡ AUTO SPIN";
    } else {
        autoBtn.textContent = "⛔ STOP AUTO";
        autoInterval = setInterval(() => {
            if (!spinning && score >= parseInt(betEl.value)) {
                spin();
            } else if (score < parseInt(betEl.value)) {
                toggleAutoSpin();
            }
        }, 2200);
    }
}

function addCredits() {
    score += 200;
    updateUI();
}

function updateUI() {
    scoreEl.textContent = score;
    bankEl.textContent = bank;
}

// Start het spel
renderSlots();
updateUI();
</script>

</body>
</html>
