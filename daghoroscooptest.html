<div id="horoscooptekst"></div>

</section>

<footer>
© 2026 - Mijn Spirituele Website Julia

<script>

/* Datum automatisch tonen */

const today = new Date();
document.getElementById("datum").innerText =
today.getDate()+"-"+(today.getMonth()+1)+"-"+today.getFullYear();


/* Horoscoop database */

const sterrenbeelden = {

Ram:[
"Vandaag voel je extra motivatie om dingen af te ronden.",
"Je energie helpt je vooruit. Gebruik dit om plannen te starten.",
"Een gesprek kan vandaag onverwachte duidelijkheid brengen."
],

Stier:[
"Geduld helpt je vandaag verder dan snelheid.",
"Een kleine stap kan vandaag grote vooruitgang betekenen.",
"Praktische keuzes brengen rust in je dag."
],

Tweelingen:[
"Nieuwe ideeën komen vandaag snel naar je toe.",
"Communicatie speelt een belangrijke rol vandaag.",
"Een spontaan gesprek kan inspiratie geven."
],

Kreeft:[
"Je intuïtie wijst je vandaag de juiste richting.",
"Rust nemen helpt je om helder te blijven denken.",
"Een vertrouwd gevoel geeft vandaag veiligheid."
],

Leeuw:[
"Je zelfvertrouwen inspireert vandaag anderen.",
"Initiatief nemen kan verrassend goed uitpakken.",
"Een warm gebaar kan veel betekenen."
],

Maagd:[
"Georganiseerd werken helpt je veel te bereiken.",
"Kleine taken afronden geeft voldoening.",
"Neem ook even tijd voor jezelf vandaag."
],

Weegschaal:[
"Samenwerking verloopt vandaag soepel.",
"Luisteren naar anderen brengt nieuwe inzichten.",
"Een spontaan moment zorgt voor gezelligheid."
],

Schorpioen:[
"Je instinct helpt je bij belangrijke keuzes.",
"Een eerlijk gesprek kan spanning oplossen.",
"Vandaag voel je een sterke drang vooruit te gaan."
],

Boogschutter:[
"Inspiratie komt uit onverwachte hoek.",
"Vandaag is goed voor plannen voor de toekomst.",
"Blijf openstaan voor nieuwe ideeën."
],

Steenbok:[
"Discipline helpt je dichter bij je doelen.",
"Rustig werken brengt vandaag succes.",
"Duidelijkheid geeft rust in relaties."
],

Waterman:[
"Creatieve ideeën komen vandaag vanzelf.",
"Nieuwe oplossingen dienen zich aan.",
"Neem tijd om even te ontspannen."
],

Vissen:[
"Je intuïtie en verbeelding zijn sterk vandaag.",
"Creatieve plannen kunnen vorm krijgen.",
"Een klein gebaar kan warmte brengen."
]

};


/* Dagnummer gebruiken als random seed */

const dag = Math.floor(today.getTime() / (1000*60*60*24));

let output = "";

for(const teken in sterrenbeelden){

const lijst = sterrenbeelden[teken];

const index = dag % lijst.length;

const tekst = lijst[index];

const symbolen={
Ram:"♈",
Stier:"♉",
Tweelingen:"♊",
Kreeft:"♋",
Leeuw:"♌",
Maagd:"♍",
Weegschaal:"♎",
Schorpioen:"♏",
Boogschutter:"♐",
Steenbok:"♑",
Waterman:"♒",
Vissen:"♓"
};

output += "<p><strong>"+symbolen[teken]+" "+teken+"</strong> – "+tekst+"</p>";

}

document.getElementById("horoscooptekst").innerHTML = output;

</script>
