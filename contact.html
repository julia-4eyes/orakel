<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mijn Webwinkel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .contact-container {
            max-width: 600px;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .contact-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            height: 120px;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background-color: #219150;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Mijn Webwinkel</h1>
    <p>Neem contact met ons op</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="index.html">Producten</a>
    <a href="#">Over Ons</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="contact-container">
    <h2>Contactformulier</h2>
    <form action="mailto:info@mijnwebwinkel.nl" method="post" enctype="text/plain">
        
        <div class="form-group">
            <label for="name">Naam</label>
            <input type="text" id="name" name="naam" required>
        </div>

        <div class="form-group">
            <label for="email">E-mailadres</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="subject">Onderwerp</label>
            <input type="text" id="subject" name="onderwerp" required>
        </div>

        <div class="form-group">
            <label for="message">Bericht</label>
            <textarea id="message" name="bericht" required></textarea>
        </div>

        <button type="submit" class="btn">Verstuur bericht</button>
    </form>
</div>

<footer>
    <p>&copy; 2026 Mijn Webwinkel - Alle rechten voorbehouden</p>
</footer>

</body>
</html>
